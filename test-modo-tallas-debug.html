<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Modo Tallas</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .error { background-color: #ffebee; border-color: #f44336; }
        .success { background-color: #e8f5e8; border-color: #4caf50; }
        .warning { background-color: #fff3e0; border-color: #ff9800; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Debug Modo Tallas</h1>
    
    <div class="section">
        <h2>1. Verificar Base de Datos</h2>
        <button onclick="verificarBaseDatos()">Verificar pedidos_procesos_prenda_detalles</button>
        <div id="db-result"></div>
    </div>
    
    <div class="section">
        <h2>2. Verificar API Response</h2>
        <input type="number" id="pedido-id" placeholder="ID del pedido" value="1" style="width: 100px;">
        <button onclick="verificarAPI()">Verificar /api/pedidos/{id}</button>
        <div id="api-result"></div>
    </div>
    
    <div class="section">
        <h2>3. Verificar Frontend</h2>
        <button onclick="verificarFrontend()">Verificar window.procesosSeleccionados</button>
        <div id="frontend-result"></div>
    </div>

    <script>
        async function verificarBaseDatos() {
            const resultDiv = document.getElementById('db-result');
            resultDiv.innerHTML = '<p>Cargando...</p>';
            
            try {
                // Simular consulta a la base de datos
                const response = await fetch('/test-modo-tallas-db');
                const data = await response.json();
                
                let html = '<h3>Resultados de Base de Datos:</h3>';
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                // Analizar resultados
                const genericos = data.filter(p => p.modo_tallas === 'generico');
                const porTallas = data.filter(p => p.modo_tallas === 'general' || p.modo_tallas === 'especifico');
                const sinModo = data.filter(p => !p.modo_tallas);
                
                html += '<div class="section">';
                html += `<p>✅ Genéricos: ${genericos.length}</p>`;
                html += `<p>🔧 Por Tallas: ${porTallas.length}</p>`;
                html += `<p>❌ Sin Modo: ${sinModo.length}</p>`;
                
                if (sinModo.length > 0) {
                    html += '<div class="error">';
                    html += '<p>⚠️ Hay procesos sin modo_talls definido:</p>';
                    html += `<pre>${JSON.stringify(sinModo, null, 2)}</pre>`;
                    html += '</div>';
                }
                
                html += '</div>';
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        async function verificarAPI() {
            const resultDiv = document.getElementById('api-result');
            const pedidoId = document.getElementById('pedido-id').value;
            
            if (!pedidoId) {
                resultDiv.innerHTML = '<div class="error">Por favor ingresa un ID de pedido</div>';
                return;
            }
            
            resultDiv.innerHTML = '<p>Cargando...</p>';
            
            try {
                const response = await fetch(`/api/pedidos/${pedidoId}`);
                const data = await response.json();
                
                let html = '<h3>Respuesta de API:</h3>';
                
                if (data.success && data.data && data.data.prendas) {
                    html += '<div class="success">✅ API respondió correctamente</div>';
                    
                    // Analizar procesos
                    let totalProcesos = 0;
                    let procesosConModoTallas = 0;
                    let procesosSinModoTallas = 0;
                    let procesoDetails = [];
                    
                    data.data.prendas.forEach((prenda, idx) => {
                        if (prenda.procesos && Array.isArray(prenda.procesos)) {
                            totalProcesos += prenda.procesos.length;
                            
                            prenda.procesos.forEach(proceso => {
                                const tieneModoTallas = proceso.modo_tallas !== undefined && proceso.modo_tallas !== null;
                                
                                if (tieneModoTallas) {
                                    procesosConModoTallas++;
                                } else {
                                    procesosSinModoTallas++;
                                }
                                
                                procesoDetails.push({
                                    prenda_idx: idx,
                                    prenda_id: prenda.id,
                                    proceso_id: proceso.id,
                                    tipo_proceso: proceso.tipo_proceso?.nombre || 'N/A',
                                    modo_tallas: proceso.modo_tallas,
                                    tiene_modo_tallas: tieneModoTallas
                                });
                            });
                        }
                    });
                    
                    html += `<p>Total de procesos: ${totalProcesos}</p>`;
                    html += `<p>✅ Con modo_tallas: ${procesosConModoTallas}</p>`;
                    html += `<p>❌ Sin modo_tallas: ${procesosSinModoTallas}</p>`;
                    
                    if (procesosSinModoTallas > 0) {
                        html += '<div class="error">';
                        html += '<p>⚠️ Procesos sin modo_tallas:</p>';
                        html += `<pre>${JSON.stringify(procesoDetails.filter(p => !p.tiene_modo_tallas), null, 2)}</pre>`;
                        html += '</div>';
                    }
                    
                    html += '<h4>Detalles completos:</h4>';
                    html += `<pre>${JSON.stringify(procesoDetails, null, 2)}</pre>`;
                    
                } else {
                    html += '<div class="error">❌ La API no devolvió datos válidos</div>';
                    html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        function verificarFrontend() {
            const resultDiv = document.getElementById('frontend-result');
            
            if (!window.procesosSeleccionados) {
                resultDiv.innerHTML = '<div class="warning">⚠️ window.procesosSeleccionados no existe</div>';
                return;
            }
            
            const procesos = window.procesosSeleccionados;
            const tipos = Object.keys(procesos);
            
            let html = '<h3>Estado de Frontend:</h3>';
            html += `<p>Total de procesos en window: ${tipos.length}</p>`;
            html += `<p>Tipos de procesos: ${tipos.join(', ')}</p>`;
            
            let detalles = [];
            
            tipos.forEach(tipo => {
                const proceso = procesos[tipo];
                const datos = proceso?.datos;
                
                if (datos) {
                    detalles.push({
                        tipo: tipo,
                        id: datos.id,
                        modo_tallas: datos.modo_tallas,
                        modoTallas: datos.modoTallas,
                        tiene_modo_tallas: datos.modo_tallas !== undefined && datos.modo_tallas !== null,
                        tiene_modoTallas: datos.modoTallas !== undefined && datos.modoTallas !== null,
                        todas_las_keys: Object.keys(datos)
                    });
                }
            });
            
            // Analizar resultados
            const conModoTallas = detalles.filter(d => d.tiene_modo_tallas);
            const conModoTallasCamel = detalles.filter(d => d.tiene_modoTallas);
            const sinModo = detalles.filter(d => !d.tiene_modo_tallas && !d.tiene_modoTallas);
            
            html += `<p>✅ Con modo_tallas (snake): ${conModoTallas.length}</p>`;
            html += `<p>✅ Con modoTallas (camel): ${conModoTallasCamel.length}</p>`;
            html += `<p>❌ Sin modo definido: ${sinModo.length}</p>`;
            
            if (sinModo.length > 0) {
                html += '<div class="error">';
                html += '<p>⚠️ Procesos sin modo definido:</p>';
                html += `<pre>${JSON.stringify(sinModo, null, 2)}</pre>`;
                html += '</div>';
            }
            
            html += '<h4>Detalles completos:</h4>';
            html += `<pre>${JSON.stringify(detalles, null, 2)}</pre>`;
            
            resultDiv.innerHTML = html;
        }
        
        // Auto-ejecutar verificación de frontend al cargar
        window.addEventListener('load', () => {
            console.log('🔍 Página de debug cargada. Ejecuta las verificaciones manualmente.');
        });
    </script>
</body>
</html>
